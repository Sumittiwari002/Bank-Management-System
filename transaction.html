<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-5">

    <div class="dashboard">

        <!-- Header -->

        <div class="header">

            <div>
                <h1>💳 Finance Dashboard</h1>
                <p>Secure Banking & Transaction Management</p>
            </div>

            <div class="profile">

                <!-- <img src="https://i.pravatar.cc/100?img=12"> -->

                <div>
                    <h5>Welcome</h5>
                    <small>Administrator</small>
                </div>

            </div>

        </div>

        
        <!-- Main Section -->

        <div class="row mt-5">

            <!-- Sidebar -->

            <div class="col-lg-3">

                <div class="glass-menu">

                    <a href="transaction_history.html">🏠 Dashboard</a>

                    <a href="index.html">🏦 Add Account</a>

                    <a href="transaction.html">💳 Add Transaction</a>

                    <a href="transaction_history.html">📜 Transaction History</a>


                </div>

            </div>

            <!-- Transaction Form -->

            <div class="col-lg-9">

                <div class="glass-card">

                    <h2>💳 Add New Transaction</h2>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label>Select Account</label>

                            <select id="acc_info" class="form-select custom-input">

                                <option value="">Select Account</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-4">

                            <label>Transaction Type</label>

                            <div class="mt-3">

                                <label class="me-4">

                                    <input type="radio" name="transactionType" id="credit" checked value="credit">Credit

                                </label>

                                <label>

                                    <input type="radio"
                                           name="transactionType"
                                           id="debit"
                                           value="debit">

                                    Debit

                                </label>

                            </div>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label>Amount</label>

                            <input
                            type="number"
                            id="amt"
                            class="form-control custom-input"
                            placeholder="Enter Amount">

                        </div>

                        <div class="col-md-6 mb-4">

                            <label>Date</label>

                            <input
                            type="date"
                            id="day"
                            class="form-control custom-input">

                        </div>

                    </div>

                    <div class="mb-4">

                        <label>Description</label>

                        <input
                        type="text"
                        id="transac"
                        class="form-control custom-input"
                        placeholder="Transaction Description">

                    </div>

                    <button
                    id="btn"
                    class="btn-save">

                        Add Transaction

                    </button>

                    <p id="message"></p>

                </div>

            </div>

        </div>

    </div>

</div>


<script type="module">
import {
    element,
    elements,
    set,
    get,
    isUnique,
    lower,
    setValue,
    getValue,
    parse,
    validate,
    stringify,
    create,
    setMessage,
    empty,
    fetchDataUl,
    checkNumber,
    checkNegative,
    getMessage,
    fetchDataOption
} from "./validation_account.js";

// Example
fetchDataOption(getValue('accountname'),getValue('account_no'), '#acc_info');
//   element('#day').addEventListener('change', function(){
//         if(element('#credit').checked)
//             set('#transac', `Salary - ${this.value}`);
//         else if(element('#debit').checked)
//             set('#transac', `Expenses - ${this.value}`);

//   })
  
  element("#btn").addEventListener("click", function () {

    let account = get("#acc_info");
    let type = document.querySelector('input[name="transactionType"]:checked')?.value;
    let amount = get("#amt");
    
    let date = get("#day");
    let description = get("#transac");

    if (account == "" || !type || amount == "" || date == "" || description == "") 
    {
        setMessage("#message", "Please fill all fields");
        return;
    }
    else if(amount<0){
        setMessage("#message", "Amount Must be in positive");
        return;
    }
    else{

    let transaction = {
        account: account,
        type: type,
        amount: Number(amount),
        date: date,
        description: description
    };
    
    let transactions = getValue("transactions");

    if (transactions == null) {
        transactions = [];
    } else {
        transactions = JSON.parse(transactions);
    }

    transactions.push(transaction);

    setValue("transactions", JSON.stringify(transactions));
    

    setMessage("#message", "Transaction Added Successfully");
    set('#acc_info', "");
    set('#amt', "");
    set('#day', "");
    set('#transac', "");
}
});

</script>

</body>
</html>
