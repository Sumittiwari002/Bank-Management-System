<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transaction History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-5">

    <div class="dashboard">

        <!-- Header -->
        <div class="header">

            <div>
                <h1>📜 Transaction History</h1>
                <p>View account statement and transaction details</p>
            </div>

            <div class="profile">

                <!-- Uncomment if image is available -->
                <!-- <img src="https://i.pravatar.cc/100?img=12" alt="Profile"> -->

                <div>
                    <h5>Welcome</h5>
                    <small>Administrator</small>
                </div>

            </div>

        </div>

        <!-- Main Content -->
        <div class="row mt-5">

            <!-- Sidebar -->
            <div class="col-lg-3">

                <div class="glass-menu">

                    <a href="transaction_history.html">🏠 Dashboard</a>

                    <a href="add_account.html">🏦 Add Account</a>

                    <a href="transaction.html">💳 Add Transaction</a>

                    <a href="transaction_history.html">📜 Transaction History</a>

                </div>

            </div>

            <!-- Statement Card -->
            <div class="col-lg-9">

                <div class="glass-card">

                    <h2>📜 Account Statement</h2>

                    <div class="row align-items-end">
                        <div class="col-md-9">
                            <label for="acc_info" class="form-label">Select Account</label>
                        <select id="acc_info" class="form-select custom-input">
                            <option>Select Account</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button id="btn" class="btn btn-save w-100">View</button>
                    </div>
                </div>

                    <div class="table-responsive mt-4">

                        <table class="table table-borderless align-middle text-center">

                            <thead>

                                <tr>

                                    <th>Date</th>

                                    <th>Type</th>

                                    <th>Amount</th>

                                    <th>Description</th>

                                    <th>Balance</th>

                                </tr>

                            </thead>

                            <tbody id="tableBody">

                            </tbody>

                        </table>

                    </div>

                    <p id="message"></p>

                </div>

            </div>

        </div>

    </div>

</div>




<script type="module">

import {
element,
elements,
set,
get,
isUnique,
lower,
setValue,
getValue,
parse,
validate,
stringify,
create,
setMessage,
empty,
fetchDataUl,
checkNumber,
checkNegative,
getMessage,
fetchDataOption
} from "./validation_account.js";

fetchDataOption(getValue('accountname'),getValue('account_no'),'#acc_info');

element("#btn").addEventListener("click", function () {

    let account = get("#acc_info");

    let transactions = getValue("transactions");

    if (transactions == null) {
        setMessage("#message", "No Transactions Found");
        return;
    }

    transactions = JSON.parse(transactions);

    let result = transactions.filter(obj => obj.account === account);

    let tbody = element("#tableBody");
    tbody.innerHTML = "";   // Clear previous rows

    if (result.length === 0) {
        setMessage("#message", "No Transactions Found");
        return;
    }
    let balance = 0;
    result.forEach(obj => {

        let tr = create("tr");
        if(obj.type === 'credit')
        balance+= obj.amount;
        else if(obj.type === "debit")
        balance-= obj.amount;


        tr.innerHTML = `
            <td class="date">${obj.date}</td>
            <td class="${obj.type}">${obj.type}</td>
            <td>${obj.amount}</td>
            <td class="description">${obj.description}</td>
            <td class="balance">${balance}</td>
        `;  
       
        element('tr').style.backgroundColor = "grey";
        // element('td').style.color = "white";



        tbody.append(tr);
    });
    element("#message").innerHTML = `Total Balance: ${balance}`;
    element("#message").style.color = "#45f480";

});
</script>

</body>

</html>
