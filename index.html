<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="background"></div>

<div class="container py-5">
 
    <div class="dashboard">

        <!-- Header -->
        <div class="header">

            <div>
                <h1>🏦 Finance Dashboard</h1>
                <p>Manage your banking accounts with ease</p>
            </div>

            <div class="profile">
                <!-- <img src="https://i.pravatar.cc/100" alt=""> -->
                <div>
                    <h5>Welcome</h5>
                    <small>Administrator</small>
                </div>
            </div>

        </div>

        <!-- Main -->

        <div class="row mt-5">

            <!-- Left -->

            <div class="col-lg-3">

                <div class="glass-menu">

                    <a href="transaction_history.html">🏠 Dashboard</a>

                    <a href="add_account.html">➕ Add Account</a>

                    <a href="transaction.html">💸 Add Transaction</a>

                    <a href="transaction_history.html">📜 Transactions</a>

                    


                </div>

            </div>

            <!-- Right -->

            <div class="col-lg-9">

                <div class="glass-card">

                    <h2>Add New Account</h2>

                    <div class="mb-4">

                        <label>Account Holder</label>

                        <input
                        type="text"
                        id="name"
                        class="form-control custom-input"
                        placeholder="Enter Account Holder Name">

                    </div>

                    <div class="mb-4">

                        <label>Account Number</label>

                        <input
                        type="text"
                        id="account"
                        class="form-control custom-input"
                        placeholder="Enter Account Number">

                    </div>

                    <button id="btn" class="btn-save">
                        Add Account
                    </button>

                    <p id="message"></p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

<script src="validation_account.js" type="module"></script>
<script type="module">
    import {element,
    elements,
    set,
    get,isUnique,
    lower,
    setValue,
    getValue,
    parse,validate,
    stringify, create, setMessage, empty,fetchDataUl,checkNumber,checkNegative, getMessage,fetchDataOption} from './validation_account.js';

    element("#btn").addEventListener('click', function(){
        let txtValue1 = lower(get('#name'));
        let txtValue2 = get('#account');
        
        let result = validate(txtValue2);
        // console.log(result);
        
        if(empty([txtValue1]) || empty([txtValue2]))
        {
        setMessage("#message", "Please enter required data");
        }
        else if(isNaN(txtValue1) && result===true) 
        {
            let accountname = getValue('accountname');
            // console.log(typeof accountname);
            let account_no = getValue('account_no');
            // console.log(account_no);


            if(accountname===null)
            {
                let arrName = new Array();
                arrName.push(txtValue1);

            
                let arrAccount = new Array();
                
                arrAccount.push(txtValue2);
                // console.log(arr);
                setValue('account_no', stringify(arrAccount));
                setValue('accountname', stringify(arrName));
                setMessage("#message", "Account Added....");
                set('#txt','')
            
            
            
            
           }
        
        
        else{
            if(isUnique(txtValue2))
            {
            let resName = parse(accountname);
            console.log(typeof resName);
            
            resName.push(txtValue1);
            let resAccount = parse(account_no);
            console.log(typeof resAccount);
            
            resAccount.push(txtValue2);
            setValue('accountname', stringify(resName));
            setValue('account_no', stringify(resAccount));
            setMessage("#message", "Account Added....");
            }
            else{
                setMessage('#message', "This account already exist....")
            }

        }
    }
    else{
        setMessage('#message', "Invalid name or account number");
    }


    });
</script>
    
</body>
</html>
